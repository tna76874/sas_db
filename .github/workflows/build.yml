name: Build Cross-Platform Binaries

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_path: run.exe
          - os: ubuntu-latest
            artifact_path: run.bin
        
    steps:
    - name: Checkout external repository
      uses: actions/checkout@v4
      with:
        repository: ${{ secrets.BUILD_REPO }}
        github-server-url: ${{ secrets.REPO_HOST }}
        token: ${{ secrets.REPO_TOKEN }}
        ref: 'main'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install Base Dependencies
      run: |
        python -m pip install --upgrade pip
        python -c "import os; os.system('pip install -r requirements.txt') if os.path.exists('requirements.txt') else None"
        python -m pip install nuitka zstandard

    - name: Build Windows EXE
      if: ${{ matrix.os == 'windows-latest' }}
      run: |
        ./build.bat

    - name: Build Linux Binary
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      shell: bash

    - name: Upload to Date-Release (Archiv)
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ${{ matrix.artifact_path }}
        asset_name: ${{ matrix.artifact_path }}
        tag: release-${{ steps.date.outputs.date }}
        overwrite: true
        body: "Archiv-Release vom ${{ steps.date.outputs.date }}."

    - name: Upload to Latest-Release (Permanente Links)
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ${{ matrix.artifact_path }}
        asset_name: ${{ matrix.artifact_path }}
        tag: latest
        overwrite: true
        body: "Die aktuellsten Binaries.."