name: Build Cross-Platform Binaries

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: win-drop
            file_name: run.exe
            final_name: sas_qr.exe
          - os: ubuntu-latest
            artifact_name: lin-drop
            file_name: run.bin
            final_name: sas_qr.AppImage
        
    steps:
    - name: Checkout external repository
      uses: actions/checkout@v4
      with:
        repository: ${{ secrets.BUILD_REPO }}
        github-server-url: ${{ secrets.REPO_HOST }}
        token: ${{ secrets.REPO_TOKEN }}
        ref: 'main'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install Base Dependencies
      run: |
        python -m pip install --upgrade pip
        python -c "import os; os.system('pip install -r requirements.txt') if os.path.exists('requirements.txt') else None"
        python -m pip install nuitka zstandard

    - name: Build Windows EXE
      if: ${{ matrix.os == 'windows-latest' }}
      run: |
        ./build.bat

    - name: Build Linux Binary
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Rename binary for release
      shell: bash
      run: mv ${{ matrix.file_name }} ${{ matrix.final_name }}

    - name: Upload temporary artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.final_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true 

    - name: Create Date Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: release-${{ steps.date.outputs.date }}
        name: Release vom ${{ steps.date.outputs.date }}
        body: "Archiv-Release vom ${{ steps.date.outputs.date }}."
        files: |
          sas_qr.exe
          sas_qr.AppImage

    - name: Update Latest Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Release
        body: "Die aktuellsten Binaries.."
        files: |
          sas_qr.exe
          sas_qr.AppImage