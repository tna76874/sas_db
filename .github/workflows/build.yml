name: Build Cross-Platform Binaries

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        
    steps:
    - name: Checkout external repository
      uses: actions/checkout@v4
      with:
        repository: ${{ secrets.BUILD_REPO }}
        github-server-url: ${{ secrets.REPO_HOST }}
        token: ${{ secrets.REPO_TOKEN }}
        ref: 'main'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install Base Dependencies
      # We removed the 'shell' override and used a python script or standard cross-platform syntax
      run: |
        python -m pip install --upgrade pip
        python -c "import os; os.path.exists('requirements.txt') and os.system('pip install -r requirements.txt')"
        python -m pip install nuitka zstandard

    - name: Build Windows EXE
      # FIXED: Added missing ${{ }} around the matrix condition
      if: ${{ matrix.os == 'windows-latest' }}
      run: |
        ./build.bat

    - name: Build Linux Binary
      # FIXED: Added missing ${{ }} around the matrix condition
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sas-db-${{ matrix.os }}
        path: |
          *.exe
          *.bin
          run.dist/
          build/
          dist/